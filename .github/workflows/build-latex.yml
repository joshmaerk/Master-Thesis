name: Build LaTeX PDF

on:
  workflow_dispatch:
    inputs:
      draft_mode:
        description: 'Include DRAFT watermark'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

# Cancel superseded runs on the same ref so the runner is not busy on stale commits.
concurrency:
  group: build-latex-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove DRAFT watermark (if requested)
        if: inputs.draft_mode == 'false'
        run: |
          sed -i \
            -e 's/\\usepackage{draftwatermark}/% \\usepackage{draftwatermark}/' \
            -e 's/\\SetWatermarkText/% \\SetWatermarkText/' \
            -e 's/\\SetWatermarkScale/% \\SetWatermarkScale/' \
            -e 's/\\SetWatermarkLightness/% \\SetWatermarkLightness/' \
            main.tex

      # Full TeX Live ships preinstalled in the Docker image, so there is no
      # apt install step and no missing-package failures. latexmk runs biber
      # and only the pdflatex passes that are actually required.
      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          latexmk_use_lualatex: false

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: thesis-pdf
          path: main.pdf
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            main.log
            main.blg
